<!DOCTYPE html>
<html>
<head>
<title>Farewell Wall</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#0f172a;
font-family:sans-serif;
color:white;
margin:0;
overflow:hidden;
}

/* หัวข้อ */

h1{
text-align:center;
margin-top:30px;
font-size:40px;
}

/* พื้นที่การ์ด */

#wall{
position:absolute;
top:120px;
left:0;
width:100%;
height:calc(100% - 120px);

display:grid;
grid-template-columns:repeat(auto-fill, minmax(220px,1fr));

gap:20px;

justify-items:center;
align-content:start;

padding:20px;
overflow:hidden;

}

/* การ์ด */

.card{

width:200px;

padding:16px;

border-radius:14px;

color:#111;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

animation:
floatSoft 6s ease-in-out infinite,
popUp 0.7s ease;

position:relative;
word-wrap:break-word;
overflow-wrap:break-word;
white-space:pre-wrap;

}
.delete{

position:absolute;

top:6px;
right:10px;

cursor:pointer;

font-size:16px;

opacity:0.6;

}

.delete:hover{
opacity:1;
transform:scale(1.2);
}

/* ลอยขึ้นลง */

@keyframes floatSoft{

0%{ transform:translateY(0px); }

50%{ transform:translateY(-25px); }

100%{ transform:translateY(0px); }

}

/* เด้งเข้าจากล่าง */

@keyframes popUp{

0%{
transform:translateY(200px) scale(0.5);
opacity:0;
}

70%{
transform:translateY(-10px) scale(1.05);
}

100%{
transform:translateY(0) scale(1);
opacity:1;
}

}

/* sparkle */

.card::after{

content:"✨";

position:absolute;

top:-10px;
right:-5px;

font-size:18px;

animation:sparkle 2s infinite;

}

@keyframes sparkle{

0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}

}

/* มือถือ */

@media(max-width:600px){

h1{
font-size:28px;
}

.card{
width:90%;
}

}

</style>
</head>

<body>

<h1>Send your message 💌</h1>

<div id="wall"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAGpnYDhR1tIrxFs4Kn4Kunkm_XEY8LFM4",
authDomain: "my-card-project-da92a.firebaseapp.com",
projectId: "my-card-project-da92a",
storageBucket: "my-card-project-da92a.firebasestorage.app",
messagingSenderId: "204571081278",
appId: "1:204571081278:web:be4650cb0b8872009a2f6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const colors = [
"#fef08a",
"#bae6fd",
"#fecaca",
"#bbf7d0",
"#ddd6fe",
"#fde68a"
];

db.collection("messages")
.orderBy("time")
.onSnapshot((snapshot)=>{

snapshot.docChanges().forEach((change)=>{

if(change.type==="added"){

const data = change.doc.data()

const card=document.createElement("div")
card.className="card"

card.dataset.id = change.doc.id

card.style.background =
colors[Math.floor(Math.random()*colors.length)]

card.style.animationDuration =
(5 + Math.random()*4) + "s"

card.innerHTML =
"<div class='delete' data-id='"+change.doc.id+"'>🗑</div>" +
"<b>"+data.name+"</b><br>"+data.msg

document.getElementById("wall").appendChild(card)

card.querySelector(".delete").onclick = function(){

const id = this.dataset.id

db.collection("messages").doc(id).delete()

}

}

})

})



</script>

</body>
</html>
