<!DOCTYPE html>
<html>
<head>
<title>Farewell Wall</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#0f172a;
font-family:sans-serif;
color:white;
margin:0;
overflow:hidden;
}

#wall{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
flex-wrap:wrap;
align-content:flex-start;
gap:20px;

padding:40px;
box-sizing:border-box;
}

.card{
width:220px;
padding:16px;
border-radius:14px;
color:#111;
font-weight:500;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

animation:pop 0.4s ease, float 6s ease-in-out infinite;
}

@keyframes pop{
0%{
transform:scale(0);
opacity:0;
}
70%{
transform:scale(1.1);
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

</style>
</head>

<body>

<h1 style="text-align:center">Send your message 💌</h1>

<div id="wall"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAGpnYDhR1tIrxFs4Kn4Kunkm_XEY8LFM4",
authDomain: "my-card-project-da92a.firebaseapp.com",
projectId: "my-card-project-da92a",
storageBucket: "my-card-project-da92a.firebasestorage.app",
messagingSenderId: "204571081278",
appId: "1:204571081278:web:be4650cb0b8872009a2f6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const colors = [
"#fef08a",
"#bae6fd",
"#fecaca",
"#bbf7d0",
"#ddd6fe",
"#fde68a"
];

db.collection("messages")
.orderBy("time")
.onSnapshot((snapshot)=>{

snapshot.docChanges().forEach((change)=>{

if(change.type==="added"){

const data = change.doc.data()

const card=document.createElement("div")
card.className="card"

card.style.background =
colors[Math.floor(Math.random()*colors.length)]

card.innerHTML =
"<b>"+data.name+"</b><br>"+data.msg

document.getElementById("wall").appendChild(card)

}

})

})

</script>

</body>
</html>
