<!DOCTYPE html>
<html>
<head>
<title>Farewell Wall</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
background:#111827;
font-family:sans-serif;
color:white;
overflow:hidden;
}

.card{
position:absolute;
background:white;
color:black;
padding:15px;
border-radius:10px;
animation:floatUp 7s linear forwards;
}

@keyframes floatUp{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-100px);
opacity:1;
}
}

</style>
</head>

<body>

<h1 style="text-align:center">Send your message 💌</h1>

<div id="messages"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAGpnYDhR1tIrxFs4Kn4Kunkm_XEY8LFM4",
  authDomain: "my-card-project-da92a.firebaseapp.com",
  projectId: "my-card-project-da92a",
  storageBucket: "my-card-project-da92a.firebasestorage.app",
  messagingSenderId: "204571081278",
  appId: "1:204571081278:web:be4650cb0b8872009a2f6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("messages")
.orderBy("time")
.onSnapshot((snapshot)=>{

snapshot.docChanges().forEach((change)=>{

if(change.type==="added"){

const data = change.doc.data()

const card=document.createElement("div")
card.className="card"

card.style.left=Math.random()*80+"%"

card.innerHTML="<b>"+data.name+"</b><br>"+data.msg

document.body.appendChild(card)

}

})

})

</script>

</body>
</html>
