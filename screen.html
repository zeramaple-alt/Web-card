<!DOCTYPE html>
<html>
<head>
<title>Farewell Wall</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

body{
background:#0f172a;
font-family:sans-serif;
color:white;
margin:0;
overflow:hidden;
}
.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;

animation:sparkle 2s infinite;
}

@keyframes sparkle{

0%{
opacity:0;
transform:scale(0.5);
}

50%{
opacity:1;
transform:scale(1.3);
}

100%{
opacity:0;
transform:scale(0.5);
}

}

#wall{
position:absolute;
top:120px;
left:0;
width:100%;
height:calc(100% - 120px);

display:grid;
grid-template-columns:repeat(auto-fill, 240px);
gap:20px;

justify-content:center;
align-content:start;

padding:20px;
}

.card{
width:220px;
padding:16px;
border-radius:14px;
color:#111;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

animation:enterFloat 0.8s ease, floatSoft 6s ease-in-out infinite;
position:relative;
}

@keyframes floatSoft{

0%{
transform:translateY(0px);
}

25%{
transform:translateY(-30px);
}

50%{
transform:translateY(-60px);
}

75%{
transform:translateY(-30px);
}

100%{
transform:translateY(0px);
}

}
@keyframes enterFloat{

0%{
transform:translateY(120px) scale(0.8);
opacity:0;
}

60%{
transform:translateY(-10px) scale(1.05);
}

100%{
transform:translateY(0px) scale(1);
opacity:1;
}

}

@keyframes pop{
0%{
transform:scale(0);
opacity:0;
}
70%{
transform:scale(1.1);
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

</style>
</head>

<body>

<h1 style="text-align:center">Send your message 💌</h1>

<div id="wall"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAGpnYDhR1tIrxFs4Kn4Kunkm_XEY8LFM4",
authDomain: "my-card-project-da92a.firebaseapp.com",
projectId: "my-card-project-da92a",
storageBucket: "my-card-project-da92a.firebasestorage.app",
messagingSenderId: "204571081278",
appId: "1:204571081278:web:be4650cb0b8872009a2f6f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const colors = [
"#fef08a",
"#bae6fd",
"#fecaca",
"#bbf7d0",
"#ddd6fe",
"#fde68a"
];

db.collection("messages")
.orderBy("time")
.onSnapshot((snapshot)=>{

snapshot.docChanges().forEach((change)=>{

if(change.type==="added"){

const cards = []
function getSafePosition(){

let x
let safe = false

while(!safe){

x = Math.random()*80
safe = true

cards.forEach(pos=>{
if(Math.abs(pos - x) < 15){
safe = false
}
})

}

cards.push(x)

return x
}

const data = change.doc.data()

const card=document.createElement("div")
card.className="card"

card.style.background =
colors[Math.floor(Math.random()*colors.length)]

card.style.left = getSafePosition() + "%"

card.innerHTML =
"<b>"+data.name+"</b><br>"+data.msg

document.getElementById("wall").appendChild(card)

}

})

})
for(let i=0;i<3;i++){

const sparkle=document.createElement("div")
sparkle.className="sparkle"

sparkle.style.top=Math.random()*80+"%"
sparkle.style.left=Math.random()*80+"%"

card.appendChild(sparkle)

}

</script>

</body>
</html>
