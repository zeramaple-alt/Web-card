<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งข้อความอำลา</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #6366f1;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        button:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            min-height: 22px;
        }

        .status.success {
            color: green;
        }

        .status.error {
            color: #dc2626;
        }

        .status.sending {
            color: #6366f1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>💌 ส่งข้อความอำลา</h2>

        <input id="name" placeholder="ชื่อของคุณ" maxlength="50">
        <textarea id="msg" placeholder="เขียนข้อความ..." maxlength="500"></textarea>

        <button id="sendBtn" onclick="send()">ส่งข้อความ</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGpnYDhR1tIrxFs4Kn4Kunkm_XEY8LFM4",
            authDomain: "my-card-project-da92a.firebaseapp.com",
            projectId: "my-card-project-da92a",
            storageBucket: "my-card-project-da92a.firebasestorage.app",
            messagingSenderId: "204571081278",
            appId: "1:204571081278:web:be4650cb0b8872009a2f6f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const btn = document.getElementById("sendBtn");
        const statusEl = document.getElementById("status");

        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = "status " + (type || "");
        }

        // reject ถ้าเกินเวลาที่กำหนด (กันค้างแบบเงียบ)
        function withTimeout(promise, ms) {
            return Promise.race([
                promise,
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("หมดเวลาเชื่อมต่อ")), ms)
                )
            ]);
        }

        function send() {
            const name = document.getElementById("name").value.trim();
            const msg = document.getElementById("msg").value.trim();

            if (!name || !msg) {
                setStatus("กรุณากรอกชื่อและข้อความให้ครบ", "error");
                return;
            }

            btn.disabled = true;
            setStatus("กำลังส่ง...", "sending");

            withTimeout(
                db.collection("messages_rawiwan").add({
                    name: name,
                    msg: msg,
                    time: Date.now()
                }),
                10000
            )
                .then(() => {
                    document.getElementById("msg").value = "";
                    setStatus("ส่งข้อความสำเร็จ! 🎉", "success");
                    btn.disabled = false;
                })
                .catch((err) => {
                    console.error("ส่งไม่สำเร็จ:", err);
                    setStatus("ส่งไม่สำเร็จ: " + err.message, "error");
                    btn.disabled = false;
                });
        }
    </script>

</body>

</html>
